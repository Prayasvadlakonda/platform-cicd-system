name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          PYTHONPATH=. pytest -v

  build:
    needs: test
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.vars.outputs.TAG }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: vars
        run: echo "TAG=${GITHUB_SHA}" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build -t platform-cicd-system:${{ steps.vars.outputs.TAG }} .

  deploy-dev:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to DEV
        run: |
          echo "Deploying image ${{ needs.build.outputs.image_tag }} to DEV"

  deploy-prod:
    needs: deploy-dev
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy to PRODUCTION
        run: |
          echo "Deploying image ${{ needs.build.outputs.image_tag }} to PRODUCTION"