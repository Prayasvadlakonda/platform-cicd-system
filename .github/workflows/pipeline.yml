name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - run: |
          PYTHONPATH=. pytest -v

  build:
    needs: test
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.vars.outputs.TAG }}
      short_tag: ${{ steps.vars.outputs.SHORT_SHA }}

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: vars
        run: |
          echo "TAG=${GITHUB_SHA}" >> $GITHUB_OUTPUT
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build -t platform-cicd-system:${{ steps.vars.outputs.TAG }} .
          docker tag platform-cicd-system:${{ steps.vars.outputs.TAG }} platform-cicd-system:latest
          docker tag platform-cicd-system:${{ steps.vars.outputs.TAG }} platform-cicd-system:${{ steps.vars.outputs.SHORT_SHA }}

  deploy-dev:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to DEV
        run: |
          echo "Deploying image:"
          echo "  full tag: ${{ needs.build.outputs.image_tag }}"
          echo "  short tag: ${{ needs.build.outputs.short_tag }}"
          echo "  alias: latest"

  deploy-prod:
    needs: deploy-dev
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy to PRODUCTION
        run: |
          echo "Deploying image ${{ needs.build.outputs.image_tag }} to PRODUCTION"

  rollback:
    needs: deploy-prod
    runs-on: ubuntu-latest
    if: failure()

    steps:
      - name: Simulate rollback
        run: |
          echo "Production deployment failed. Rolling back to previous stable version..."