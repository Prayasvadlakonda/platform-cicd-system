name: CI/CD Pipeline

on:
  push:
    branches: ["develop", "main"]
  pull_request:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          PYTHONPATH=. pytest -v

  build:
    needs: test
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.vars.outputs.TAG }}
      short_tag: ${{ steps.vars.outputs.SHORT_SHA }}

    steps:
      - uses: actions/checkout@v6

      - name: Set image tag
        id: vars
        run: |
          echo "TAG=${GITHUB_SHA}" >> $GITHUB_OUTPUT
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

          if [[ "${GITHUB_EVENT_NAME}" == "release" ]]; then
          echo "RELEASE_TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push Docker image
        run: |
          IMAGE=ghcr.io/prayasvadlakonda/platform-cicd-system

          docker build -t $IMAGE:${{ steps.vars.outputs.TAG }} .
          docker tag $IMAGE:${{ steps.vars.outputs.TAG }} $IMAGE:latest
          docker tag $IMAGE:${{ steps.vars.outputs.TAG }} $IMAGE:${{ steps.vars.outputs.SHORT_SHA }}

          docker push $IMAGE:${{ steps.vars.outputs.TAG }}
          docker push $IMAGE:latest
          docker push $IMAGE:${{ steps.vars.outputs.SHORT_SHA }}

          # Release tagging (only on release)
          if [[ "${{ github.event_name }}" == "release" ]]; then
            docker tag $IMAGE:${{ steps.vars.outputs.TAG }} $IMAGE:${{ steps.vars.outputs.RELEASE_TAG }}
            docker push $IMAGE:${{ steps.vars.outputs.RELEASE_TAG }}
          fi

  deploy-dev:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'

    steps:
      - name: Deploy to DEV
        run: |
          IMAGE=ghcr.io/prayasvadlakonda/platform-cicd-system
          echo "Deploying image:"
          echo "  full tag: $IMAGE:${{ needs.build.outputs.image_tag }}"
          echo "  short tag: $IMAGE:${{ needs.build.outputs.short_tag }}"
          echo "  alias: $IMAGE:latest"

  deploy-prod:
    needs: build
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Debug event
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "ref=${{ github.ref }}"
          echo "ref_name=${{ github.ref_name }}"
          echo "action=${{ github.event.action }}"

      - name: Deploy to PRODUCTION
        run: |
          IMAGE=ghcr.io/prayasvadlakonda/platform-cicd-system
          echo "Deploying image $IMAGE:${{ needs.build.outputs.image_tag }} to PRODUCTION"
            fi

  rollback:
    needs: deploy-prod
    runs-on: ubuntu-latest
    if: failure()

    steps:
      - name: Simulate rollback
        run: |
          echo "Production deployment failed. Rolling back to previous stable version..."